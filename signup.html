<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign up • FeedStream</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    .auth-wrap{min-height:100svh; display:grid; place-items:center; padding:20px}
    .auth-card{width:min(520px, 92vw); padding:26px; border:1px solid var(--border); border-radius:16px; background:var(--panel); box-shadow:var(--shadow)}
    .auth-card h1{margin:0 0 6px; font-size:clamp(22px, 3.2vw, 28px)}
    .auth-card p{margin:0 0 18px; color:var(--muted)}
    .field{display:flex; flex-direction:column; gap:8px; margin:12px 0}
    .field label{font-size:14px; color:#cfd6ff}
    .field input{padding:12px 14px; border-radius:12px; border:1px solid var(--border); background:var(--panel-sub); color:#eef0ff}
    .actions{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-top:16px}
    .text-link{color:#c9d1ff; text-decoration:none}
    .text-link:hover{text-decoration:underline}
    .error{color:#ff8b8b; font-size:13px; display:none; margin-top:8px}
  </style>
</head>
<body>
  <main class="auth-wrap">
    <form class="auth-card glass" id="signupForm">
      <h1>Create your account</h1>
      <p>Join FeedStream in seconds.</p>
      <div class="field">
        <label for="su-name">Full name</label>
        <input id="su-name" name="name" type="text" placeholder="Alex Doe" autocomplete="name" required />
      </div>
      <div class="field">
        <label for="su-email">Email</label>
        <input id="su-email" name="email" type="email" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="su-pass">Password</label>
        <input id="su-pass" name="password" type="password" placeholder="••••••••" autocomplete="new-password" required minlength="6" />
      </div>
      <div class="error" id="su-error">Please fill all fields with valid info.</div>
      <div class="actions">
        <a class="text-link" href="signin.html">Already have an account?</a>
        <button type="submit" class="btn btn-primary">Create account</button>
      </div>
    </form>
  </main>
  <script src="auth.js"></script>
</body>
</html>
