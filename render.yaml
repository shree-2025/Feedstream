# Render configuration for deployment

services:
  # ---------------------------
  # Backend Service
  # ---------------------------
  - type: web
    name: feedstream-backend
    env: node
    buildCommand: |
      cd backend \
      && npm install --no-optional
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: NPM_CONFIG_PLATFORM
        value: linux
    build:
      os: ubuntu22.04
      nodeVersion: 18.x
